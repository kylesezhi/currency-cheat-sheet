<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="../static/card.css" />
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="title">{{ title }}</div>
      <div class="subtitle">{{ exchange_rate_text }}</div>
    </div>

    <div class="divider"></div>

    <table class="rates">
      <tbody>
        {% for row in rows %}
        <tr>
          <td>{{ row.local }}</td>
          <td class="value">{{ row.usd }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <div class="footer">
      Generated {{ generated_date }}
    </div>
  </div>
</body>
</html>
